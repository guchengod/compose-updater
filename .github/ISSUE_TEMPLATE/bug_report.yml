name: Bug report
description: 报告可复现的问题
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: 请移除 Device Key、Registry 密码、Token 和其他敏感信息。
  - type: input
    id: version
    attributes:
      label: compose-updater 版本
      placeholder: v0.4.0
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: 运行平台
      placeholder: Docker / Linux amd64 / macOS arm64 / Windows amd64
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为和日志
      description: 请脱敏后粘贴完整结果 JSON 和相关日志。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
    validations:
      required: true
