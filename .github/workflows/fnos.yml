name: fnOS FPK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed release tag
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Build x86 and ARM FPK
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: echo "tag=${INPUT_TAG:-$REF_NAME}" >> "$GITHUB_OUTPUT"
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          check-latest: true
          cache-dependency-path: go.sum
      - name: Install official fnpack
        run: |
          curl -fsSLo /tmp/fnpack https://static2.fnnas.com/fnpack/fnpack-1.2.3-linux-amd64
          chmod +x /tmp/fnpack
          /tmp/fnpack --help
      - name: Build FPK packages
        env:
          VERSION: ${{ steps.release.outputs.tag }}
          FNPACK: /tmp/fnpack
        run: ./scripts/build-fnos.sh
      - name: Generate checksums
        run: sha256sum build/fnos/*.fpk > build/fnos/SHA256SUMS-fnOS
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ComposeUpdater-${{ steps.release.outputs.tag }}-fnOS
          path: build/fnos/*
          if-no-files-found: error
      - name: Wait for the main Release workflow
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          for attempt in $(seq 1 60); do
            if gh release view "${TAG}" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 5
          done
          echo "GitHub Release ${TAG} was not created in time" >&2
          exit 1
      - name: Attach FPK packages to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: gh release upload "${TAG}" build/fnos/* --clobber
