name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to release
        required: true
        type: string

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  test:
    name: Test release source
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          check-latest: true
          cache-dependency-path: go.sum
      - name: Test and vet
        run: |
          go test ./...
          go vet ./...

  binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64, extension: "", archive: tar.gz }
          - { goos: linux, goarch: arm64, extension: "", archive: tar.gz }
          - { goos: darwin, goarch: amd64, extension: "", archive: tar.gz }
          - { goos: darwin, goarch: arm64, extension: "", archive: tar.gz }
          - { goos: windows, goarch: amd64, extension: ".exe", archive: zip }
          - { goos: windows, goarch: arm64, extension: ".exe", archive: zip }
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: echo "tag=${INPUT_TAG:-$REF_NAME}" >> "$GITHUB_OUTPUT"
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          check-latest: true
          cache-dependency-path: go.sum
      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.release.outputs.tag }}
        run: |
          package="compose-updater-${VERSION}-${GOOS}-${GOARCH}"
          commit="$(git rev-parse HEAD)"
          mkdir -p "dist/${package}"
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${commit} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${package}/compose-updater${{ matrix.extension }}" \
            ./cmd/compose-updater
          cp README.md CHANGELOG.md LICENSE config.example.json compose.example.yaml "dist/${package}/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -qr "${package}.zip" "${package}")
          else
            tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          fi
          rm -rf "dist/${package}"
      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: compose-updater-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: echo "tag=${INPUT_TAG:-$REF_NAME}" >> "$GITHUB_OUTPUT"
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true
      - name: Generate checksums
        working-directory: release
        run: sha256sum * > SHA256SUMS
      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-checksums: release/SHA256SUMS
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release/*
